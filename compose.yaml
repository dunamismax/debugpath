services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-debugpath}
      POSTGRES_USER: ${POSTGRES_USER:-debugpath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-debugpath}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-debugpath} -d ${POSTGRES_DB:-debugpath}']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-debugpath}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-debugpathminio}
    ports:
      - '9000:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      WEB_UPSTREAM: ${DEBUGPATH_WEB_UPSTREAM:-host.docker.internal:4321}
      API_UPSTREAM: ${DEBUGPATH_API_UPSTREAM:-host.docker.internal:3000}
    ports:
      - '${DEBUGPATH_PROXY_PORT:-8080}:8080'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
